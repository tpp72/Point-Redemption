<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>เข้าสู่ระบบ - Point Redemption</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="logo">
      <span class="logo-icon">🎁</span>
      <h1>Point <span>Redemption</span></h1>
      <p>ระบบแลกของรางวัลสำหรับสมาชิก</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">ชื่อผู้ใช้</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" required />
        </div>
      </div>
      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required />
        </div>
      </div>
      <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
